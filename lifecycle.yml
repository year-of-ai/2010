# lifecycle.yml — instance lifecycle state for the grow → replant → consolidate cycle.
#
# Maintained by the `check-lifecycle` skill (tick reconciliation against seed.md §8)
# and by the `replant` / `consolidate` prompts (phase transitions).
# Hand-edit only the `policy` block, and only to deliberately change the knobs.
# Design doc: LIFECYCLE.md. Concept-agnostic framework; instance-specific values
# live here, exactly like the Concept Definition lives in seed.md §1.

lifecycle:
  policy:
    # Growth ticks per generation before this repo replants and spawns a successor.
    replant_after_ticks: 3
    # Lineage size (excluding the reference origin) that triggers consolidation.
    consolidate_at_members: 7
    succession:
      # Natural-language rule the replant prompt follows to derive the successor concept.
      rule: "Increment the calendar year of the newest lineage member by one (the year 2005 -> the year 2006)."
    consolidation:
      # Naming rule for the consolidated repository.
      naming_rule: "Hyphenated range of the lineage's years, oldest-newest (e.g. 2005-2011)."
      # Layout rule for merged content inside the consolidated repository.
      layout: "One top-level directory per lineage member, named by its subject slug (e.g. 2005/, 2006/)."
    models:
      # Model the scheduled tick runs on (read by .github/workflows/grow.yml).
      tick: "claude-sonnet-4-6"
      # Frontier model for the one-time lineage meta-review (/distill).
      distill: "claude-fable-5"
    # Lineage size that triggers the one-time distillation meta-review.
    distill_at_members: 3

  state:
    # growing | mature (replanted; successor spawned) | consolidated (merged + archived)
    status: growing
    # Growth ticks recorded in seed.md §8 since the most recent Genesis or Replant entry.
    # seed.md §8 is the source of truth; check-lifecycle reconciles this number each tick.
    generation_ticks: 0
    # Reference instance the framework was inherited from. NOT counted toward consolidation.
    origin: "bamr87/1987"
    # Spawn chain, oldest first. Carried forward (and appended to) by every spawn,
    # so the newest member always knows the full family and when it reaches the
    # consolidation threshold.
    lineage:
      - subject: "the year 2005"
        repo: "year-of-ai/2005"
        status: mature
        spawned_from: "bamr87/1987"
      - subject: "the year 2006"
        repo: "year-of-ai/2006"
        status: mature
        spawned_from: "year-of-ai/2005"
      - subject: "the year 2007"
        repo: "year-of-ai/2007"
        status: mature
        spawned_from: "year-of-ai/2006"
      - subject: "the year 2008"
        repo: "year-of-ai/2008"
        status: mature
        spawned_from: "year-of-ai/2007"
      - subject: "the year 2009"
        repo: "year-of-ai/2009"
        status: mature
        spawned_from: "year-of-ai/2008"
        successor: "year-of-ai/2010"
      - subject: "the year 2010"
        repo: "year-of-ai/2010"
        status: growing
        spawned_from: "year-of-ai/2009"
